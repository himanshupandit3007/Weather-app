<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="rain-layer" class="rain-container"></div>
    <div id="snow-layer" class="snow-container"></div>

    <div class="container">
        <h1 id="main_heading">Weather App</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button onclick="getWeather()">Get Weather</button>
        </div>

        

        <div class="toggle-container">
            <span>°C</span>
            <label class="switch">
                <input type="checkbox" id="unitToggle" onchange="toggleUnit()">
                <span class="slider"></span>
            </label>
            <span>°F</span>
        </div>

        <div id="weatherResult"></div>
        <div id="hourlyForecast"></div>
        <div id="dailyForecast"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
